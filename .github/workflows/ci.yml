name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build, format gate, and all unprivileged tests. Runs in a Fedora 43 container
  # because the tests need OpenSSL 3.5 (X25519MLKEM768); the ptrace tests need
  # CAP_SYS_PTRACE (test_failclosed traces a sibling) and an unconfined seccomp
  # profile (to allow the ptrace syscall).
  build-test:
    runs-on: ubuntu-latest
    container:
      image: fedora:43
      options: --cap-add=SYS_PTRACE --security-opt seccomp=unconfined
    steps:
      - name: Install toolchain
        run: |
          dnf -y install git gcc make clang clang-tools-extra bpftool \
            libbpf-devel openssl openssl-devel elfutils-libelf-devel pkgconf-pkg-config
      - uses: actions/checkout@v4

      - name: Format gate (clang-format)
        run: |
          files=$(find ticket-agent injector bpf demo -type f \( -name '*.c' -o -name '*.h' \) \
            ! -name vmlinux.h ! -name '*.skel.h')
          clang-format --dry-run --Werror $files

      - name: Build all components
        run: |
          make -C bpf vmlinux.h
          make -C ticket-agent
          make -C injector          # daemon (pulls the BPF skeleton)
          make -C bpf               # detection loader
          make -C demo

      - name: Agent tests (pool, UDS, session, serve/get)
        run: make -C ticket-agent check

      - name: Injector tests (remote-call, symbols, fail-closed, real install)
        run: make -C injector check

  # eBPF load + uprobe detection. BPF in hosted CI is environment-sensitive
  # (BTF, privilege), so this is best-effort and does not block the build.
  ebpf:
    runs-on: ubuntu-latest
    continue-on-error: true
    container:
      image: fedora:43
      options: --privileged
    steps:
      - name: Install toolchain
        run: |
          dnf -y install git gcc make clang bpftool libbpf-devel \
            openssl openssl-devel elfutils-libelf-devel pkgconf-pkg-config sudo
      - uses: actions/checkout@v4
      - name: Build BPF + detection loader
        run: |
          make -C bpf vmlinux.h
          make -C bpf test/test_detect
      - name: Detection test (uprobe on SSL_connect)
        run: ./bpf/test/test_detect
